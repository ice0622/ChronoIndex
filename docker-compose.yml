services:
  # -------------------------------------------------------
  # 開発用インタラクティブシェル
  # docker compose run --rm dev bash
  # -------------------------------------------------------
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: chronoindex:latest
    container_name: chronoindex_dev
    env_file:
      - .env
    environment:
      # /app は chronouser 所有なので権限エラーが起きない
      - HF_HOME=/app/.cache/huggingface
      # Python の stdout/stderr バッファリングを無効化（ログをリアルタイム表示）
      - PYTHONUNBUFFERED=1
    volumes:
      # ソースコードをリアルタイムで反映（編集したら即有効）
      - ./src:/app/src
      - ./evaluate:/app/evaluate
      - ./tasks:/app/tasks
      # データの永続化（音声・文字起こし・出力ファイル）
      - ./data:/app/data
      # HuggingFace / Whisper モデルキャッシュ（bind mountで権限問題を回避）
      - ./cache/huggingface:/app/.cache/huggingface
      - ./cache/whisper:/app/.cache/whisper
    working_dir: /app
    stdin_open: true
    tty: true
    # GPU 環境に移行する場合は以下をコメントアウト解除
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # -------------------------------------------------------
  # パイプライン実行（CLIで直接動画URLを処理する用途）
  # docker compose run --rm pipeline <YouTube_URL>
  # -------------------------------------------------------
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: chronoindex:latest
    container_name: chronoindex_pipeline
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./cache/huggingface:/app/.cache/huggingface
      - ./cache/whisper:/app/.cache/whisper
    command: ["python", "-m", "src.pipeline"]

  # -------------------------------------------------------
  # 話者ダイアライゼーション対応版（PyTorch + pyannote.audio 入り）
  #
  # 初回セットアップ（PC でのビルド不要）:
  #   docker compose pull diarize
  #   → ghcr.io/ice0622/chronoindex:diarize を DL するだけ
  #
  # イメージは GitHub Actions が自動ビルド・更新する
  #   Dockerfile.diarize を変更して push → 自動再ビルド
  #
  # 実行:
  #   docker compose run --rm diarize python -m src.pipeline \
  #     --url "https://www.youtube.com/watch?v=XXXX"
  # -------------------------------------------------------
  diarize:
    image: ghcr.io/ice0622/chronoindex:diarize
    container_name: chronoindex_diarize
    env_file:
      - .env
    environment:
      - HF_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
      - DIARIZATION_ENABLED=true
    volumes:
      - ./src:/app/src
      - ./evaluate:/app/evaluate
      - ./data:/app/data
      - ./cache/huggingface:/app/.cache/huggingface
      - ./cache/whisper:/app/.cache/whisper
    working_dir: /app
    stdin_open: true
    tty: true

volumes: {}
