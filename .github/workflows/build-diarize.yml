name: Build diarize image

# ─────────────────────────────────────────
# トリガー
# ─────────────────────────────────────────
on:
  # いずれかのファイルが変わったら自動ビルド
  push:
    branches: [main]
    paths:
      - Dockerfile
      - Dockerfile.diarize
      - requirements-local.txt
      - requirements.txt

  # GitHub の Actions タブから手動実行も可能
  workflow_dispatch:

# ─────────────────────────────────────────
# GHCR への push 権限
# ─────────────────────────────────────────
permissions:
  contents: read
  packages: write   # ghcr.io への push に必要

jobs:
  build-and-push:
    runs-on: ubuntu-latest   # GitHub の無料クラウドサーバー（2コア・7GB RAM）

    steps:
      # 1. ソースコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2. BuildKit（Docker の高速ビルドエンジン）を有効化
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. GHCR にログイン（GITHUB_TOKEN は自動で設定済み・追加設定不要）
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. ベースイメージ（chronoindex:latest）をビルドして GHCR に push
      #    Dockerfile.diarize が FROM ghcr.io/ice0622/chronoindex:latest を参照するため先にビルドする
      #    ※ setup-buildx-action は docker-container ドライバを使うため、
      #       load: true でホスト側に読み込んでも次ステップのビルダーからは
      #       アクセスできない。GHCR 経由で共有するのが正しい方法。
      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/ice0622/chronoindex:latest
          # GitHub Actions のキャッシュを使って再ビルドを高速化
          cache-from: type=gha,scope=base
          cache-to:   type=gha,scope=base,mode=max

      # 5. ダイアライゼーション対応イメージをビルド → GHCR に push
      - name: Build and push diarize image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.diarize
          push: true
          tags: ghcr.io/ice0622/chronoindex:diarize
          # GitHub Actions のキャッシュを使う（PyTorch の再DLを防ぐ）
          cache-from: type=gha,scope=diarize
          cache-to:   type=gha,scope=diarize,mode=max
